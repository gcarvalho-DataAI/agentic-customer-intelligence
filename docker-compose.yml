services:
  mongo:
    image: mongo:7
    container_name: aci-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-agentic_customer_intelligence}
    volumes:
      - mongo_data:/data/db

  postgres:
    image: pgvector/pgvector:pg16
    container_name: aci-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentic_customer_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-aci}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aci}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  mongo_data:
  postgres_data:

